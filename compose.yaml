# ========================================
# Docker Compose Configuration
# Modern Node.js Todo Application
# ========================================

services:
  # ========================================
  # Development Service
  # ========================================
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: nestjs-dev
    ports:
      - '${APP_PORT:-3000}:3000' # API server
      - '${DEBUG_PORT:-9229}:9229' # Node.js debugger

    env_file:
      - .env
    environment:
      NODE_ENV: development
      # DOCKER_ENV: 'true'
      # POSTGRES_HOST: db
      # POSTGRES_PORT: 5432
      # POSTGRES_DB: user_crud
      # POSTGRES_USER: postgres
      # POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-postgres}'
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - '**/*.test.*'
            - '**/__tests__/**'
        - action: rebuild
          path: ./package.json
    restart: unless-stopped
    networks:
      - nestjs-network

  # ========================================
  # Production Service
  # ========================================
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nestjs-prod
    ports:
      - '${PROD_PORT:-8080}:3000'

    env_file:
      - .env

    environment:
      NODE_ENV: production
      JWT_SECRET: '${JWT_SECRET:-supersecretkeyjwt}'
    
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # deploy:
    #   resources:
    #     limits:
    #       memory: '${PROD_MEMORY_LIMIT:-2G}'
    #       cpus: '${PROD_CPU_LIMIT:-1.0}'
    #     reservations:
    #       memory: '${PROD_MEMORY_RESERVATION:-512M}'
    #       cpus: '${PROD_CPU_RESERVATION:-0.25}'
    # security_opt:
    #   - no-new-privileges:true
    # read_only: true
    # tmpfs:
    #   - /tmp
    networks:
      - nestjs-network
    profiles:
      - prod

  # ========================================
  # PostgreSQL Database Service
  # ========================================
  db:
    image: postgres:18-alpine
    container_name: nestjs-db
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-user_crud}'
      POSTGRES_USER: '${POSTGRES_USER:-postgres}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-postgres}'
    volumes:
      - postgres_data:/var/lib/postgresql   # không dùng thêm /data vì postgres: 18-alpine
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-user_crud}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nestjs-network
  
  # ========================================
  # Redis Service
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: nestjs-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nestjs-network
    command: ["redis-server", "--appendonly", "yes"] # bật chế độ lưu dữ liệu bền vững
    volumes:
      - redis_data:/data

  # ========================================
  # RabbitMQ Service
  # ========================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nestjs-rabbitmq
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'     # API port
      - '${RABBITMQ_MANAGEMENT:-15672}:15672'  # Web UI port
    environment:
      RABBITMQ_DEFAULT_USER: '${RABBITMQ_USER:-guest}'
      RABBITMQ_DEFAULT_PASS: '${RABBITMQ_PASS:-guest}'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - nestjs-network

# ========================================
# Volume Configuration
# ========================================
volumes:
  postgres_data:
    name: nestjs-postgres-data 
    driver: local
  redis_data:
    name: nestjs-redis-data
    driver: local
  rabbitmq_data:
    name: nestjs-rabbitmq-data
    driver: local

# ========================================
# Network Configuration
# ========================================
networks:
  nestjs-network:
    name: nestjs-network
    driver: bridge